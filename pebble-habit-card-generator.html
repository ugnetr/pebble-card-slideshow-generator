<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pebble Habit Card Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #f5f5f5;
    --panel: #ffffff;
    --border: #e2e2e2;
    --text: #11181c;
    --text-secondary: #6b7280;
    --accent: #3e6f7a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px 28px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; color: var(--text-secondary); font-size: 13px; }

  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    align-items: start;
  }
  .controls {
    padding: 20px;
    height: calc(100vh - 80px);
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }
  .preview {
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  section.block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  section.block h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
    margin: 0 0 10px;
  }

  .swatchGrid, .shapeGridEl {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .swatchCard, .shapeCard {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  .swatchCard input, .shapeCard input { margin: 0; flex-shrink: 0; }
  .swatchDots { display: flex; flex-wrap: wrap; gap: 2px; max-width: 90px; }
  .swatchDots .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .swatchLabel { font-weight: 600; }
  .swatchDesc { color: var(--text-secondary); font-size: 10.5px; }
  .shapeLabel { font-size: 11px; color: var(--text-secondary); }

  .categoryGridEl {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 220px;
    overflow-y: auto;
  }
  .categoryChip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #f0f0f0;
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .categoryChip .count { color: var(--text-secondary); }
  .catActions { margin-bottom: 8px; display: flex; gap: 8px; }
  .catActions button {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
  }

  .row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  .sliderRow {
    display: grid;
    grid-template-columns: 120px 1fr 52px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
    font-size: 12.5px;
  }
  .sliderRow input[type="range"] { width: 100%; }
  .sliderValue { color: var(--text-secondary); font-size: 11.5px; text-align: right; }
  select, input[type="number"] {
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 13px;
  }
  button.primary {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: white;
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }

  #previewCanvas {
    width: 402px;
    height: auto;
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    background: white;
  }
  .previewNav { display: flex; gap: 8px; }
  #previewMeta { font-size: 12px; color: var(--text-secondary); text-align: center; max-width: 500px; }

  #iconPicker {
    width: 402px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    background: white;
    font-size: 13px;
  }
  .iconPickerHead { display: flex; align-items: center; gap: 6px; }
  .iconPickerLabel { color: var(--text-secondary); }
  .currentIconGlyph { font-size: 20px; line-height: 1; width: 24px; text-align: center; }
  #currentIconName { font-family: monospace; font-size: 12px; }
  .iconOverrideTag {
    font-size: 10px; background: #2f5d63; color: white;
    padding: 1px 6px; border-radius: 999px;
  }
  #iconPickerBody { margin-top: 8px; }
  #iconSearch {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; box-sizing: border-box; margin-bottom: 8px;
  }
  #iconGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
    gap: 4px;
    max-height: 240px;
    overflow-y: auto;
  }
  .iconBtn {
    aspect-ratio: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-size: 21px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .iconBtn:hover { background: #f2f4f7; border-color: #2f5d63; }
  .iconBtn.selected { background: #e5eef0; border-color: #2f5d63; border-width: 2px; }

  #progressWrap { display: none; margin-top: 10px; }
  #progressTrack {
    background: #eee;
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }
  #progressBar {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.15s;
  }
  #progressText { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
  #habitCount { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <h1>🪨 Pebble Habit Card Generator</h1>
  <p>Bulk-generate 1206×1499 PNG marketing cards from the habit spreadsheet, using the app's real color palettes and pebble shapes.</p>
</header>

<div class="layout">
  <div class="controls">

    <section class="block">
      <h2>Color palettes</h2>
      <div id="paletteGrid" class="swatchGrid"></div>
    </section>

    <section class="block">
      <h2>Pebble shapes</h2>
      <div id="shapeGrid" class="shapeGridEl"></div>
    </section>

    <section class="block">
      <h2>Habits to include</h2>
      <div class="catActions">
        <button id="selectAllCategories">Select all</button>
        <button id="selectNoneCategories">Select none</button>
      </div>
      <div id="categoryGrid" class="categoryGridEl"></div>
    </section>

    <section class="block">
      <h2>Style</h2>
      <div class="row">
        <label>Theme</label>
        <select id="themeSelect">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <div class="row">
        <label>Assign colors/shapes</label>
        <select id="assignMode">
          <option value="cycle">Cycle through selection</option>
          <option value="random">Random (seeded)</option>
        </select>
      </div>
      <div class="row">
        <label>Seed</label>
        <input type="number" id="seedInput" style="width:90px" />
        <button class="secondary" id="shuffleSeed">🎲 Shuffle</button>
      </div>
    </section>

    <section class="block">
      <h2>Card &amp; text layout</h2>
      <div class="sliderRow">
        <label>Card size</label>
        <input type="range" id="cardScale" min="55" max="125" step="1" />
        <span class="sliderValue" id="cardScaleValue"></span>
      </div>
      <div class="sliderRow">
        <label>Corner radius</label>
        <input type="range" id="cardRadius" min="0" max="90" step="2" />
        <span class="sliderValue" id="cardRadiusValue"></span>
      </div>
      <div class="sliderRow">
        <label>Vertical position</label>
        <input type="range" id="offsetY" min="-350" max="350" step="5" />
        <span class="sliderValue" id="offsetYValue"></span>
      </div>
      <div class="sliderRow">
        <label>Text size</label>
        <input type="range" id="captionSize" min="20" max="60" step="1" />
        <span class="sliderValue" id="captionSizeValue"></span>
      </div>
      <div class="sliderRow">
        <label>Gap card → text</label>
        <input type="range" id="captionGap" min="20" max="240" step="5" />
        <span class="sliderValue" id="captionGapValue"></span>
      </div>
      <div class="sliderRow">
        <label>Gap between texts</label>
        <input type="range" id="captionSpacing" min="8" max="100" step="2" />
        <span class="sliderValue" id="captionSpacingValue"></span>
      </div>
      <div class="sliderRow">
        <label>Text max width</label>
        <input type="range" id="captionMaxWidth" min="500" max="1100" step="10" />
        <span class="sliderValue" id="captionMaxWidthValue"></span>
      </div>
      <div class="row">
        <label>Text color</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:13px">
          <input type="checkbox" id="captionColorAuto" checked /> Theme default
        </label>
        <input type="color" id="captionColor" value="#11181C" disabled />
      </div>
      <button class="secondary" id="resetLayout" style="margin-top:6px">Reset layout</button>
    </section>

    <section class="block">
      <h2>Background</h2>
      <div class="row">
        <label>Animation</label>
        <select id="bgAnimation">
          <option value="stripes">Stripes</option>
          <option value="waves">Waves</option>
          <option value="none">None</option>
        </select>
      </div>
      <div class="row">
        <label>Page color</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:13px">
          <input type="checkbox" id="bgColorAuto" checked /> Theme default
        </label>
        <input type="color" id="bgColor" value="#FFFFFF" disabled />
      </div>
      <div class="row">
        <label>Card color</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:13px">
          <input type="checkbox" id="cardBackgroundAuto" checked /> Theme default
        </label>
        <input type="color" id="cardBackground" value="#FFFFFF" disabled />
      </div>
      <div class="row">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px">
          <input type="checkbox" id="backgroundOnly" /> Background only (hide card &amp; text)
        </label>
      </div>
    </section>

    <section class="block">
      <h2>Export</h2>
      <div id="habitCount"></div>
      <div class="row">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px">
          <input type="checkbox" id="groupFolders" checked />
          Group into folders of 4 (distinct category + color)
        </label>
      </div>
      <div class="row">
        <label style="display:flex;align-items:flex-start;gap:6px;font-size:13px">
          <input type="checkbox" id="transparentLayers" />
          <span>Transparent layers — export each habit as two PNGs
          (<code>-card</code> + <code>-text</code>) on a transparent background
          instead of one composite. All theme, color, and text settings still
          apply.</span>
        </label>
      </div>
      <button class="primary" id="bulkGenerate">Generate All as ZIP</button>
      <div id="progressWrap">
        <div id="progressTrack"><div id="progressBar"></div></div>
        <div id="progressText"></div>
      </div>
    </section>

  </div>

  <div class="preview">
    <canvas id="previewCanvas"></canvas>
    <div id="previewMeta"></div>
    <div class="previewNav">
      <button class="secondary" id="prevHabit">← Prev</button>
      <button class="secondary" id="randomHabit">🔀 Random</button>
      <button class="secondary" id="nextHabit">Next →</button>
      <button class="secondary" id="downloadOne">⬇ Download this PNG</button>
    </div>

    <div id="iconPicker">
      <div class="iconPickerHead">
        <span class="iconPickerLabel">Icon:</span>
        <span id="currentIconGlyph" class="currentIconGlyph"></span>
        <b id="currentIconName"></b>
        <span id="iconOverrideTag" class="iconOverrideTag" style="display:none">custom</span>
        <span style="flex:1"></span>
        <button class="secondary" id="toggleIconPicker">Change icon</button>
        <button class="secondary" id="resetIcon" title="Revert to the auto-picked icon">Auto</button>
      </div>
      <div id="iconPickerBody" style="display:none">
        <input type="text" id="iconSearch" placeholder="Search icons by name or keyword…" />
        <div id="iconGrid"></div>
      </div>
    </div>
  </div>
</div>

<script>
// habits.js
const HABITS = [{"num": 1, "category": "Body & Movement", "name": "Morning stretch", "description": "Stretch full body after waking", "text1": "Reach for the ceiling before you reach for your phone.", "text2": "No routine needed, just move whatever feels stiff.", "text3": "A gentle way to tell your body the day has started."}, {"num": 2, "category": "Body & Movement", "name": "20 squats", "description": "Do 20 bodyweight squats", "text1": "No gym, no equipment, no excuses. Just you and gravity.", "text2": "Break them into two sets of ten if you like.", "text3": "Fits in the time it takes your coffee to brew."}, {"num": 3, "category": "Body & Movement", "name": "1-min plank", "description": "Hold a plank for one minute", "text1": "Can't do a minute yet? Start with twenty seconds.", "text2": "Knees down counts. Showing up is the habit.", "text3": "One minute of stillness that's anything but passive."}, {"num": 4, "category": "Body & Movement", "name": "10 push-ups", "description": "Do 10 push-ups anywhere", "text1": "Wall, knees, or floor. Every version counts.", "text2": "Attach it to something you already do daily.", "text3": "Ten reps. Done before you can talk yourself out of it."}, {"num": 5, "category": "Body & Movement", "name": "Balance on one leg", "description": "Stand on one leg, 30s each", "text1": "Try it while brushing your teeth.", "text2": "Wobbling is the exercise, not the failure.", "text3": "A tiny daily conversation with your sense of balance."}, {"num": 6, "category": "Body & Movement", "name": "Walk one block extra", "description": "Add a tiny detour to any walk", "text1": "Take the long way around, on purpose.", "text2": "New streets, same shoes.", "text3": "The scenic route is a choice you can make daily."}, {"num": 8, "category": "Body & Movement", "name": "Take the stairs once", "description": "Choose stairs over elevator once", "text1": "Just once a day. The elevator will forgive you.", "text2": "Free, everywhere, and always open.", "text3": "A small vote for the more active version of you."}, {"num": 9, "category": "Body & Movement", "name": "Wall sit 45s", "description": "Hold a wall sit for 45 seconds", "text1": "Any wall works. Even the office one.", "text2": "Count seconds, hum a chorus, or just breathe.", "text3": "Forty-five seconds of quiet effort, invisible to everyone else."}, {"num": 10, "category": "Body & Movement", "name": "Dead hang", "description": "Hang from a bar for 30 seconds", "text1": "Find a bar, hold on, let gravity do the stretching.", "text2": "Start with ten seconds. Grip builds with patience.", "text3": ""}, {"num": 11, "category": "Body & Movement", "name": "Jump 25 times", "description": "Do 25 jumping jacks or hops", "text1": "A tiny burst of movement whenever the afternoon drags.", "text2": "No form rules. Just get airborne, briefly.", "text3": "Takes less time than deciding what to snack on."}, {"num": 12, "category": "Body & Movement", "name": "Hip openers", "description": "1 minute of hip stretches", "text1": "Deep squat, butterfly, or lunge. Pick your favorite.", "text2": "A kind gesture toward hips that sit all day.", "text3": "One minute, once a day. That's the whole assignment."}, {"num": 13, "category": "Body & Movement", "name": "Eye exercises", "description": "Look far, near, and around, 1 min", "text1": "Look out the window at the farthest thing you can find.", "text2": "Give your eyes a change of scenery, literally.", "text3": "A one-minute break made for screen-heavy days."}, {"num": 14, "category": "Body & Movement", "name": "Posture reset", "description": "Stand tall against a wall, 1 min", "text1": "Heels, hips, shoulders, head - meet the wall.", "text2": "Think tall, not stiff.", "text3": "A daily reminder of what upright feels like."}, {"num": 15, "category": "Body & Movement", "name": "Dance to one song", "description": "Move freely to a full song", "text1": "Pick a song. Move however you want. Nobody's watching.", "text2": "Three minutes of zero-skill-required movement.", "text3": "The rare workout that doubles as a mood."}, {"num": 16, "category": "Food & Hydration", "name": "Water before coffee", "description": "Drink a glass of water first", "text1": "Water first, coffee second. That's the whole rule.", "text2": "Pour it the night before so it's waiting for you.", "text3": "A simple way to start the day hydrated."}, {"num": 17, "category": "Food & Hydration", "name": "One fruit a day", "description": "Eat a piece of fruit", "text1": "Keep fruit where you can see it. Visibility is half the habit.", "text2": "Any fruit counts. Even the boring apple.", "text3": "One small colorful choice, once a day."}, {"num": 18, "category": "Food & Hydration", "name": "Eat one bite slowly", "description": "Chew first bite 20 times", "text1": "Just the first bite. The rest of the meal is yours.", "text2": "Notice the taste you usually rush past.", "text3": "A tiny experiment in actually tasting your food."}, {"num": 19, "category": "Food & Hydration", "name": "Add one vegetable", "description": "Add a veggie to any meal", "text1": "Frozen, raw, or leftover. Anything green (or orange) counts.", "text2": "One handful, any meal, zero recipes required.", "text3": "A small upgrade to whatever's already on the plate."}, {"num": 20, "category": "Food & Hydration", "name": "No-screen first bite", "description": "Start meals without screens", "text1": "Just the first few bites, screen-free.", "text2": "Let the food have your attention, briefly.", "text3": "A tiny pocket of presence in a busy day."}, {"num": 21, "category": "Food & Hydration", "name": "Glass of water at 3pm", "description": "Hydrate at the slump hour", "text1": "Set a 3pm reminder. Drink. Done.", "text2": "Before reaching for a snack, try the glass first.", "text3": "A mid-afternoon reset that costs nothing."}, {"num": 22, "category": "Food & Hydration", "name": "Spice experiment", "description": "Add one new spice or herb", "text1": "Your spice rack is full of unopened adventures.", "text2": "One pinch of something you've never tried.", "text3": "Same dinner, new personality."}, {"num": 23, "category": "Food & Hydration", "name": "Protein check", "description": "Ask \"where's my protein?\" at meals", "text1": "One question per meal. That's the whole habit.", "text2": "No tracking apps needed. Just a glance at the plate.", "text3": "A moment of awareness before the first bite."}, {"num": 24, "category": "Food & Hydration", "name": "Last sip mindfully", "description": "End drinks with one mindful sip", "text1": "Make the last sip the slowest one.", "text2": "A three-second pause hidden inside every drink.", "text3": "Notice what you're drinking. That's it, that's the habit."}, {"num": 25, "category": "Food & Hydration", "name": "Kitchen close-down", "description": "Declare kitchen \"closed\" after dinner", "text1": "Wipe the counter, turn off the light, say goodnight to the kitchen.", "text2": "A clear finish line for the day's eating.", "text3": "Tomorrow's breakfast starts in a clean kitchen."}, {"num": 26, "category": "Mind & Mindfulness", "name": "10 deep breaths", "description": "Ten slow belly breaths", "text1": "In through the nose, slow out through the mouth. Ten times.", "text2": "Doable anywhere: desk, car, queue, couch.", "text3": "The most portable habit on this list."}, {"num": 27, "category": "Mind & Mindfulness", "name": "1-min meditation", "description": "Sit still and observe for 60s", "text1": "Sixty seconds. Sitting. That's genuinely all.", "text2": "Mind wandering? That's normal. Noticing it is the practice.", "text3": "The smallest possible version of a very old practice."}, {"num": 28, "category": "Mind & Mindfulness", "name": "Body scan", "description": "Mentally scan head to toe", "text1": "Head to toe, one slow pass, like a friendly inspection.", "text2": "Just notice what's tense. No need to fix anything.", "text3": "A one-minute check-in with the body that carries you around."}, {"num": 29, "category": "Mind & Mindfulness", "name": "Name 3 sounds", "description": "Pause and identify 3 sounds", "text1": "Stop. Listen. Count three sounds you can hear right now.", "text2": "Works anywhere with ears and thirty seconds.", "text3": "A tiny doorway back into the present moment."}, {"num": 30, "category": "Mind & Mindfulness", "name": "Label the feeling", "description": "Name your emotion in one word", "text1": "One word. \"Tired.\" \"Restless.\" \"Fine, actually.\"", "text2": "No journaling required. Just the naming.", "text3": "Putting a word on it is a skill worth practicing."}, {"num": 31, "category": "Mind & Mindfulness", "name": "Worry parking", "description": "Write worries on a \"later\" list", "text1": "Give the worry a parking spot so it stops circling.", "text2": "Write it down; decide about it tomorrow.", "text3": "Paper holds worries so your head doesn't have to."}, {"num": 32, "category": "Mind & Mindfulness", "name": "5-4-3-2-1 grounding", "description": "Notice 5 sights, 4 sounds, etc.", "text1": "Five things you see, four you hear, three you feel, two you smell, one you taste.", "text2": "A classic grounding technique, pocket-sized.", "text3": "Use it whenever the day feels like too many tabs open."}, {"num": 33, "category": "Mind & Mindfulness", "name": "One-minute nothing", "description": "Do absolutely nothing for 60s", "text1": "No phone, no plan, no podcast. Sixty seconds of blank.", "text2": "Harder than it sounds. Simpler than it feels.", "text3": "Boredom, in small doses, is an interesting place."}, {"num": 34, "category": "Mind & Mindfulness", "name": "Smile for 30 seconds", "description": "Hold a genuine smile", "text1": "Yes, on purpose. Yes, even alone.", "text2": "Think of something that earns the smile.", "text3": "Thirty seconds of choosing your own expression."}, {"num": 35, "category": "Mind & Mindfulness", "name": "Mental weather report", "description": "Rate your inner state 1–10", "text1": "Sunny, cloudy, or scattered thoughts - give today a number.", "text2": "Ten seconds of honesty with yourself.", "text3": ""}, {"num": 36, "category": "Gratitude & Positivity", "name": "3 gratitudes", "description": "Write three things you're grateful for", "text1": "Three things. Any size. \"Good coffee\" absolutely counts.", "text2": "Repeat yesterday's answers if you must - but hunt for new ones.", "text3": "A tiny daily inventory of what's already good."}, {"num": 37, "category": "Gratitude & Positivity", "name": "Thank one person", "description": "Send a short thank-you message", "text1": "One sentence, one person, once a day.", "text2": "Old teachers, quiet helpers, that one friend - the list is endless.", "text3": "Gratitude is more fun delivered than stored."}, {"num": 38, "category": "Gratitude & Positivity", "name": "Savor one moment", "description": "Relive today's best moment for 1 min", "text1": "Replay today's highlight like a favorite scene.", "text2": "Every day has a best moment, even the rough ones.", "text3": "One minute of pressing \"save\" on a memory."}, {"num": 39, "category": "Gratitude & Positivity", "name": "Compliment someone", "description": "Give one sincere compliment", "text1": "Specific beats generic: praise the thing, not just the person.", "text2": "Costs nothing, takes seconds, always in stock.", "text3": "Look for something worth complimenting - the looking is the habit."}, {"num": 40, "category": "Gratitude & Positivity", "name": "Win of the day", "description": "Write one thing you did well", "text1": "One line. One win. However small.", "text2": "\"Answered the scary email\" is a perfectly valid entry.", "text3": "Build your own evidence file, one day at a time."}, {"num": 41, "category": "Gratitude & Positivity", "name": "Reframe one complaint", "description": "Turn a complaint into a request", "text1": "\"This is annoying\" → \"Could we try...?\"", "text2": "One reframe a day is plenty.", "text3": "A small exercise in aiming frustration somewhere useful."}, {"num": 42, "category": "Gratitude & Positivity", "name": "Future thank-you", "description": "Thank future-you for one choice", "text1": "Do one small thing tomorrow-you will appreciate.", "text2": "Fill the water bottle. Set out the keys. Sign the form.", "text3": "A tiny gift across time, sent daily."}, {"num": 43, "category": "Gratitude & Positivity", "name": "Gratitude photo", "description": "Photograph one thing you appreciate", "text1": "One photo a day of something you're glad exists.", "text2": "No filters needed, no posting required.", "text3": "Your camera roll becomes a collection of good things."}, {"num": 44, "category": "Gratitude & Positivity", "name": "Cheer for a stranger", "description": "Silently wish a stranger well", "text1": "Pick a stranger. Silently wish them a good day. Move on.", "text2": "Invisible, free, and oddly enjoyable.", "text3": "A private kindness practice no one will ever know about."}, {"num": 45, "category": "Gratitude & Positivity", "name": "End-of-day highlight", "description": "Tell someone your day's highlight", "text1": "Swap highlights at dinner instead of complaints.", "text2": "\"Best part of your day?\" is a better question than \"how was it?\"", "text3": "One good story per day, shared out loud."}, {"num": 46, "category": "Learning & Growth", "name": "Read one page", "description": "Read a single book page", "text1": "One page. You're allowed to stop. You probably won't.", "text2": "Keep the book where you'll see it.", "text3": "The world's least intimidating reading plan."}, {"num": 47, "category": "Learning & Growth", "name": "Learn one word", "description": "Learn a new word in any language", "text1": "One word a day, any language, including your own.", "text2": "Say it out loud once for it to stick better", "text3": "Small words, collected daily, add up to something."}, {"num": 48, "category": "Learning & Growth", "name": "One flashcard review", "description": "Review flashcards for 2 minutes", "text1": "Two minutes of review beats zero minutes of intention.", "text2": "Do it in a queue, on a bus, between meetings.", "text3": "Little and often is the whole trick."}, {"num": 49, "category": "Learning & Growth", "name": "Explain one concept", "description": "Explain something aloud simply", "text1": "Explain it like you're talking to a curious ten-year-old.", "text2": "Stumbling is useful - it shows you where to look next.", "text3": "Teaching an empty room still is still a great practise."}, {"num": 50, "category": "Learning & Growth", "name": "Watch 1 educational clip", "description": "One short lesson video", "text1": "One short clip on purpose beats an hour by accident.", "text2": "Pick the topic before you open the app.", "text3": "Curiosity, served in five-minute portions."}, {"num": 51, "category": "Learning & Growth", "name": "Ask one question", "description": "Write one question you can't answer", "text1": "Write down one thing you genuinely don't know.", "text2": "No need to answer it today. Collecting questions is the habit.", "text3": ""}, {"num": 52, "category": "Learning & Growth", "name": "Skill micro-rep", "description": "Practice a skill for 2 minutes", "text1": "Two minutes of scales, sketching, code, or chords.", "text2": "Consistency is doing the tiny version on busy days.", "text3": "Keep the instrument (or tool) within arm's reach."}, {"num": 53, "category": "Learning & Growth", "name": "Read one news summary", "description": "One brief, quality news digest", "text1": "One good summary instead of an endless scroll.", "text2": "Pick a source you trust; let it brief you once a day.", "text3": "Informed, in minutes, on your own terms."}, {"num": 54, "category": "Learning & Growth", "name": "Wikipedia rabbit hole", "description": "Read one random wiki intro", "text1": "Hit \"random article\" and read just the intro.", "text2": "The world is full of things you didn't know existed.", "text3": "A daily dose of \"huh, interesting.\""}, {"num": 55, "category": "Learning & Growth", "name": "Review yesterday's lesson", "description": "Recall what yesterday taught you", "text1": "Ask: what did yesterday try to teach me?", "text2": "One line is enough. Patterns show up on their own.", "text3": "Experience plus reflection is where learning lives."}, {"num": 56, "category": "Creativity", "name": "One doodle", "description": "Draw anything for 2 minutes", "text1": "Stick figures welcome. Quality is not the point.", "text2": "Same pen, same corner of a notebook, every day.", "text3": "Two minutes of making marks nobody will grade."}, {"num": 57, "category": "Creativity", "name": "Write one sentence", "description": "Add one sentence to a story", "text1": "One sentence a day. The story doesn't mind waiting.", "text2": "Bad sentences are allowed - that's what editing is for.", "text3": "Stories get written a little at a time."}, {"num": 58, "category": "Creativity", "name": "10 bad ideas", "description": "List ten terrible ideas fast", "text1": "Ten ideas, speed over quality, terrible encouraged.", "text2": "Any topic: dinner, gifts, business, weekend plans.", "text3": "Practice having ideas without judging them first."}, {"num": 59, "category": "Creativity", "name": "Photo of one detail", "description": "Photograph one overlooked detail", "text1": "Shadows, textures, corners - the stuff nobody photographs.", "text2": "One frame a day trains the eye to look.", "text3": "Your street has details you've never noticed. Find one."}, {"num": 60, "category": "Creativity", "name": "Hum a made-up tune", "description": "Invent a 30-second melody", "text1": "Hum something that didn't exist a minute ago.", "text2": "Shower acoustics recommended, not required.", "text3": "Thirty seconds of original music, composer: you."}, {"num": 61, "category": "Creativity", "name": "Alternate uses game", "description": "List 5 odd uses for an object", "text1": "A brick, a spoon, a paperclip - what else could it be?", "text2": "Five uses, the weirder the better.", "text3": "A classic creativity warm-up, one minute long."}, {"num": 62, "category": "Creativity", "name": "Haiku of the day", "description": "Write one 5-7-5 haiku", "text1": "Five, seven, five. About anything. Even lunch.", "text2": "Tiny poems fit in phone notes.", "text3": "A small daily exercise in saying more with less."}, {"num": 63, "category": "Creativity", "name": "Color hunt", "description": "Find 5 things of one chosen color", "text1": "Pick a color at breakfast, hunt for it all day.", "text2": "Turns any commute into a scavenger hunt.", "text3": "Amazing how much orange the world contains once you look."}, {"num": 64, "category": "Creativity", "name": "Remix a routine", "description": "Do one routine task differently", "text1": "New route, different order, other hand - remix one thing.", "text2": "Small changes make familiar days more interesting.", "text3": "Autopilot is comfy. Visit manual mode once a day."}, {"num": 65, "category": "Creativity", "name": "One metaphor", "description": "Describe your day as a metaphor", "text1": "\"Today was a slow elevator.\" Now you try.", "text2": "One metaphor a day, no explanation required.", "text3": "A playful way to notice what kind of day it actually was."}, {"num": 66, "category": "Productivity & Focus", "name": "Top 3 for tomorrow", "description": "Write tomorrow's top 3 tasks", "text1": "Three tasks, written tonight, waiting for you tomorrow.", "text2": "If everything is a priority, pick three anyway.", "text3": "Tomorrow-morning-you prefers a list to a blank page."}, {"num": 67, "category": "Productivity & Focus", "name": "2-minute rule", "description": "Do one task that takes under 2 min", "text1": "If it takes under two minutes, do it now.", "text2": "One tiny task a day keeps the pile from forming.", "text3": "Small tasks are lighter done than carried."}, {"num": 68, "category": "Productivity & Focus", "name": "Single-tab minute", "description": "Work 1 min with one tab open", "text1": "One tab, one minute, one thing t a 5-min timer for one task", "text1": "Five-minute timer, one task, go.", "text2": "Deadlines focus the mind, even fake ones.", "text3": "Race the clock once a day, just for fun."}, {"num": 76, "category": "Relationships & Social", "name": "Check in on someone", "description": "Send one \"thinking of you\" text", "text1": "One message: \"Hey, thought of you today.\"", "text2": "No occasion needed. That's what makes it nice.", "text3": "Friendships run on small check-ins."}, {"num": 77, "category": "Relationships & Social", "name": "Ask one real question", "description": "Ask someone a deeper question", "text1": "Trade one \"how's it going\" for \"what's been on your mind?\"", "text2": "One real question a day, to anyone.", "text3": "Better questions, better conversations. Worth practicing."}, {"num": 78, "category": "Relationships & Social", "name": "Eye contact hello", "description": "Greet someone with real eye contact", "text1": "Look up, make eye contact, say hi like you mean it.", "text2": "Neighbors, baristas, colleagues - anyone counts.", "text3": "A two-second habit with a human on the other end."}, {"num": 79, "category": "Relationships & Social", "name": "Listen without fixing", "description": "Just listen for 2 min, no advice", "text1": "Two minutes of listening with zero solutions offered.", "text2": "\"That sounds hard\" is a complete sentence.", "text3": "Sometimes the help is the listening itself."}, {"num": 80, "category": "Relationships & Social", "name": "Apology or appreciation", "description": "Offer one of the two daily", "text1": "Each day: one small \"sorry\" or one small \"thank you.\"", "text2": "Little repairs, made early, stay little.", "text3": "Relationship maintenance, one sentence at a time."}, {"num": 81, "category": "Relationships & Social", "name": "Remember one detail", "description": "Note a detail someone shared", "text1": "Their dog's name, their trip, their big meeting - write one down.", "text2": "Remembering is mostly deciding to remember.", "text3": "Small details, remembered, mean a lot to people."}, {"num": 82, "category": "Relationships & Social", "name": "Hug for 10 seconds", "description": "One long hug daily", "text1": "A real hug, held a beat longer than usual.", "text2": "Family, partner, friend - all valid.", "text3": "Ten seconds. Fully there."}, {"num": 83, "category": "Relationships & Social", "name": "Speak one boundary", "description": "State one small preference or no", "text1": "One small honest \"actually, I'd prefer...\" per day.", "text2": "Start tiny: where to eat, when to leave, what to skip.", "text3": "Saying what you want is a practice, not a personality."}, {"num": 84, "category": "Relationships & Social", "name": "Praise publicly", "description": "Credit someone in front of others", "text1": "\"That was Maria's idea\" takes three seconds to say.", "text2": "Give credit loudly, once a day.", "text3": "Shine the light on someone else and see what happens."}, {"num": 85, "category": "Relationships & Social", "name": "Learn a name", "description": "Learn and use one new name", "text1": "Ask, repeat it back, use it once. Learned.", "text2": "Name tags exist. Read one today.", "text3": "Names are small keys to friendlier days."}, {"num": 86, "category": "Money & Finance", "name": "Log every expense", "description": "Note today's spending, 2 min", "text1": "Write down today's spending - just the facts.", "text2": "No judging, only noticing.", "text3": "Awareness first. Everything else comes after."}, {"num": 88, "category": "Money & Finance", "name": "24-hour wish list", "description": "Park wants for a day before buying", "text1": "Want it? Write it down. Revisit tomorrow.", "text2": "The wish list is where impulse goes to think it over.", "text3": "Sleep on it - the deal will usually still be there."}, {"num": 89, "category": "Money & Finance", "name": "Check one subscription", "description": "Review one recurring charge", "text1": "One subscription a day: keep,  without phone", "description": "First 5 min of day phone-free", "text1": "Let the first five minutes of the day belong to you.", "text2": "The notifications will wait. They always do.", "text3": "Start the morning before the internet does."}, {"num": 97, "category": "Digital Wellbeing", "name": "Unfollow one account", "description": "Remove one feed that drains you", "text1": "One unfollow a day. Curate ruthlessly.", "text2": "Your feed, your guest list.", "text3": "If it consistently sours your mood, it can go."}, {"num": 98, "category": "Digital Wellbeing", "name": "Notifications audit", "description": "Silence one notification type", "text1": "Mute one app's buzz a day and see if you miss it.", "text2": "Most notifications are apps talking about themselves.", "text3": "Fewer pings, chosen deliberately."}, {"num": 99, "category": "Digital Wellbeing", "name": "One-screen dinner", "description": "Eat one meal fully screen-free", "text1": "One meal a day with zero screens at the table.", "text2": "The food and the company get top billing.", "text3": "An old-fashioned dinner, once daily."}, {"num": 100, "category": "Digital Wellbeing", "name": "Delete 5 photos", "description": "Remove 5 useless photos daily", "text1": "Five blurry, duplicate, or mystery screenshots - gone.", "text2": "Tiny deletions, tidy camera roll.", "text3": "Curate your photos like they're worth keeping. They are."}, {"num": 101, "category": "Digital Wellbeing", "name": "Bedtime phone dock", "description": "Phone charges outside bedroom", "text1": "Give the phone its own bedroom.", "text2": "An alarm clock costs less than the scrolling.", "text3": "The last thing you see at night shouldn't be a feed."}, {"num": 102, "category": "Digital Wellbeing", "name": "One digital declutter", "description": "Delete one app/file/email chain", "text1": "One app, file, or thread deleted per day.", "text2": "Digital clutter is still clutter.", "text3": "Lighter devices, one deletion at a time."}, {"num": 103, "category": "Digital Wellbeing", "name": "Post nothing, notice", "description": "Enjoy one moment without sharing", "text1": "One nice moment a day, kept entirely to yourself.", "text2": "Not everything needs an audience.", "text3": "Experience first. Sharing optional."}, {"num": 104, "category": "Digital Wellbeing", "name": "Reply, don't scroll", "description": "Answer one message before feeds", "text1": "Open messages before feeds - answer one human first.", "text2": "Connection before consumption.", "text3": "One reply a day keeps the guilt away."}, {"num": 105, "category": "Digital Wellbeing", "name": "Screen-time glance", "description": "Check yesterday's screen time", "text1": "One honest look at yesterday's number.", "text2": "No shame - just information.", "text3": "You can't steer what you don't see."}, {"num": 106, "category": "Sleep & Evening", "name": "Same bedtime alarm", "description": "Alarm signals wind-down time", "text1": "Set an alarm for bedtime, not just morning.", "text2": "When it rings, start landing the plane.", "text3": "Consistency is the least glamorous sleep advice - and the most repeated."}, {"num": 107, "category": "Sleep & Evening", "name": "Tomorrow's clothes out", "description": "Lay out tomorrow's outfit", "text1": "Pick the outfit tonight; skip the debate tomorrow.", "text2": "One less decision before coffee.", "text3": "A two-minute favor to your morning self."}, {"num": 108, "category": "Sleep & Evening", "name": "3 lines in a journal", "description": "Write three lines before bed", "text1": "Three lines. What happened, how it felt, what's next.", "text2": "No literary standards apply.", "text3": "A tiny record of a day that actually happened."}, {"num": 109, "category": "Sleep & Evening", "name": "Stretch before bed", "description": "2 minutes of gentle stretching", "text1": "Slow, gentle, sleepy stretching - nothing athletic.", "text2": "A quiet signal that the day is wrapping up.", "text3": "End the day the way you'd like it to feel."}, {"num": 110, "category": "Sleep & Evening", "name": "Dim lights early", "description": "Lower lights an hour before bed", "text1": "Dim the lights and let the evening be an evening.", "text2": "Lamps over ceiling lights after dinner.", "text3": "Set the scene for sleep before you want it."}, {"num": 111, "category": "Sleep & Evening", "name": "One-line brain dump", "description": "Write tomorrow's first task", "text1": "Write down tomorrow's first move. One line.", "text2": "Park the planning on paper before bed.", "text3": "Tomorrow starts easier with the first step pre-decided."}, {"num": 112, "category": "Sleep & Evening", "name": "Gratitude before sleep", "description": "Last thought: one good thing", "text1": "End the day naming one good thing from it.", "text2": "Even hard days usually hide one.", "text3": "A gentler final thought, chosen on purpose."}, {"num": 113, "category": "Sleep & Evening", "name": "No caffeine check", "description": "Confirm no caffeine after 2pm", "text1": "A quick afternoon check-in: was that the last coffee?", "text2": "Afternoon-you and midnight-you have different opinions on espresso.", "text3": "One small daily agreement with yourself about caffeine."}, {"num": 114, "category": "Sleep & Evening", "name": "Cool the room", "description": "Crack a window or drop the thermostat", "text1": "Cool room, warm blanket - a classic combination.", "text2": "Two minutes of prep for a night of comfort.", "text3": "Make the bedroom a place worth sleeping in."}, {"num": 115, "category": "Sleep & Evening", "name": "Read 2 pages in bed", "description": "Paper pages, not screens", "text1": "Two paper pages before lights out.", "text2": "The book doesn't glow, ping, or autoplay.", "text3": "A calmer last chapter to the day."}, {"num": 116, "category": "Morning Rituals", "name": "Make the bed", "description": "Straighten your bed after rising", "text1": "Two minutes, one made bed, first task done.", "text2": "It's not about the bed. It's about the start.", "text3": "Begin the day with something finished."}, {"num": 117, "category": "Morning Rituals", "name": "Open window first", "description": "Fresh air within 5 min of waking", "text1": "Crack the window and let the day in.", "text2": "Fresh air is the original morning ritual.", "text3": "Thirty seconds of weather, delivered to your face."}, {"num": 118, "category": "Morning Rituals", "name": "Morning sunlight", "description": "2 min of daylight on your face", "text1": "Step outside or lean out a window - two minutes of daylight.", "text2": "Cloudy counts. Outside is outside.", "text3": "Meet the day where it lives."}, {"num": 119, "category": "Morning Rituals", "name": "Say today's intention", "description": "One sentence: today I will...", "text1": "One sentence, said out loud: \"Today I will...\"", "text2": "An intention is a to-do list with a spine.", "text3": "Aim the day before the day aims you."}, {"num": 120, "category": "Morning Rituals", "name": "Cold water face splash", "description": "Splash cold water on waking", "text1": "Cold water, face, done. Good morning.", "text2": "The fastest wake-up ritual known to bathrooms.", "text3": "A small, bracing hello to the day."}, {"num": 121, "category": "Morning Rituals", "name": "First-hour no news", "description": "No news in the first hour awake", "text1": "Let your own thoughts load before the headlines do.", "text2": "The news will still be news in an hour.", "text3": "Mornings first, world second."}, {"num": 122, "category": "Morning Rituals", "name": "Sing in the shower", "description": "One song, full commitment", "text1": "One song, full volume, zero shame.", "text2": "The shower is the most forgiving venue on earth.", "text3": "Start the day with a performance."}, {"num": 123, "category": "Morning Rituals", "name": "Drink water by the bed", "description": "Glass prepared the night before", "text1": "Tonight's two-second prep, tomorrow's first win.", "text2": "Wake up, reach over, drink. Habit complete.", "text3": "Hydration with zero morning effort."}, {"num": 125, "category": "Morning Rituals", "name": "One-song tidy", "description": "Tidy anything for one song's length", "text1": "Press play, tidy until the song ends, stop.", "text2": "Three minutes of cleaning with a built-in finish line.", "text3": "Pick an anthem. Race it."}, {"num": 126, "category": "Home & Environment", "name": "Water the plants check", "description": "Touch soil of one plant", "text1": "Finger in the soil: thirsty or fine?", "text2": "Plants prefer attention on a schedule.", "text3": "A ten-second check-in with something alive."}, {"num": 127, "category": "Home & Environment", "name": "One item out", "description": "Donate/trash one unneeded item", "text1": "One item leaves the house today. Any item.", "text2": "Decluttering, at the least dramatic possible pace.", "text3": "Lighter, one object at a time."}, {"num": 128, "category": "Home & Environment", "name": "Reset one corner", "description": "Return one zone to its ideal state", "text1": "Pick one small zone and return it to \"how it should look.\"", "text2": "Corners, shelves, drawers - one per day.", "text3": "Small resets keep big messes theoretical."}, {"num": 129, "category": "Home & Environment", "name": "Fix or list one thing", "description": "Repair it or write it down", "text1": "Fix it in five minutes, or put it on the fix-it list.", "text2": "Squeaks, drips, and wobbles: one per day gets addressed.", "text3": "A house feels different when things get handled."}, {"num": 130, "category": "Home & Environment", "name": "Smell check", "description": "Add one good scent to your space", "text1": "Candle, citrus peel, fresh air, coffee - one good smell daily.", "text2": "Scent is the fastest way to change a room.", "text3": "Make your space smell like somewhere you'd want to be."}, {"num": 131, "category": "Home & Environment", "name": "Desk reset ritual", "description": "Clear desk completely at day's end", "text1": "Two minutes: clear the desk, close the tabs, done.", "text2": "End work with a visible finish line.", "text3": "Tomorrow deserves a clean runway."}, {"num": 132, "category": "Home & Environment", "name": "Rotate one thing", "description": "Move/swap one decor item", "text1": "Move one object to a new spot today.", "text2": "Rearranging is free redecorating.", "text3": "Fresh eyes for a familiar room, one swap at a time."}, {"num": 133, "category": "Home & Environment", "name": "Open all curtains", "description": "Let full daylight in each morning", "text1": "All the curtains, all the way, every morning.", "text2": "Daylight is free. Take all of it.", "text3": "Let the room wake up too."}, {"num": 134, "category": "Home & Environment", "name": "Wipe one surface", "description": "Quick wipe of a single surface", "text1": "One surface, one wipe, thirty seconds.", "text2": "Tiny cleanings prevent big ones.", "text3": "The counter appreciates the attention."}, {"num": 135, "category": "Home & Environment", "name": "Prep one thing for tomorrow", "description": "Stage one item by the door", "text1": "Put one tomorrow-item by the door tonight.", "text2": "Keys, gym bag, umbrella, letter - pick tomorrow's candidate.", "text3": "Smooth exits are made the night before."}, {"num": 136, "category": "Nature & Senses", "name": "Touch something natural", "description": "Touch wood, plant, stone daily", "text1": "Bark, leaf, stone, grass - touch one today.", "text2": "A ten-second texture break from glass and plastic.", "text3": "Nature is touchable. That's rather the point."}, {"num": 137, "category": "Nature & Senses", "name": "Step outside barefoot", "description": "1 min barefoot on any ground", "text1": "Shoes off, one minute, any safe patch of ground.", "text2": "Grass, sand, or balcony tiles - your feet don't mind.", "text3": "An oddly memorable sixty seconds."}, {"num": 138, "category": "Nature & Senses", "name": "Watch stars 1 min", "description": "Just look up, no agenda", "text1": "One minute of looking up, agenda-free.", "text2": "Clouds by day, stars by night - the sky runs both shifts.", "text3": "The oldest screen there is."}, {"num": 139, "category": "Nature & Senses", "name": "Smell the air outside", "description": "3 deep breaths outdoors", "text1": "Step out, three deep breaths, notice what the air carries.", "text2": "Rain, cut grass, someone's dinner - the air has news.", "text3": "Three breaths of outside, daily."}, {"num": 140, "category": "Nature & Senses", "name": "Notice one animal", "description": "Spot one bird, bug, or creature", "text1": "Find one creature today: bird, bug, cat, or squirrel.", "text2": "They're everywhere once you start looking.", "text3": "A daily reminder the city is shared."}, {"num": 141, "category": "Nature & Senses", "name": "Listen to silence", "description": "Find 1 min of quietest sound", "text1": "Find the quietest minute your day offers.", "text2": "Notice the smallest sound inside the silence.", "text3": "Quiet is a place. Visit daily."}, {"num": 142, "category": "Nature & Senses", "name": "Sunset/sunrise glance", "description": "Catch the sky at golden hour", "text1": "Catch the sky doing its evening (or morning) show.", "text2": "Two minutes, best lighting of the day.", "text3": "It's scheduled daily. Attendance optional but recommended."}, {"num": 143, "category": "Nature & Senses", "name": "Feel the temperature", "description": "Notice warmth/cold on skin, 30s", "text1": "Thirty seconds of just noticing: warm, cold, breezy?", "text2": "Weather is information, not an opinion.", "text3": "A tiny check-in with the physical world."}, {"num": 144, "category": "Nature & Senses", "name": "Eat one thing outdoors", "description": "Any bite eaten outside", "text1": "Take one bite of something outside today.", "text2": "Snacks taste different in fresh air. Verify daily.", "text3": "The smallest possible picnic."}, {"num": 145, "category": "Nature & Senses", "name": "Follow one scent", "description": "Track where a smell comes from", "text1": "Catch a smell, follow it to its source.", "text2": "Bakery? Rain? Flowers? Investigate.", "text3": "A tiny detective game for your nose."}, {"num": 146, "category": "Self-Reflection", "name": "One-line diary", "description": "Summarize the day in one line", "text1": "The whole day, one line. That's the format.", "text2": "365 lines a year adds up to a life, noted.", "text3": "Short enough to keep, long enough to matter."}, {"num": 147, "category": "Self-Reflection", "name": "Ask \"what did I avoid?\"", "description": "Name one avoided thing", "text1": "One honest question a day: what did I dodge today?", "text2": "Just name it. Action optional.", "text3": "Avoidance shrinks under a little light."}, {"num": 148, "category": "Self-Reflection", "name": "Values check", "description": "Did today match my values? Y/N", "text1": "One question, yes or no: did today fit who I want to be?", "text2": "No essay needed. The question does the work.", "text3": "A daily compass check, ten seconds long."}, {"num": 149, "category": "Self-Reflection", "name": "One thing I'd redo", "description": "Name today's one redo moment", "text1": "If you could replay one moment today, which one?", "text2": "Notice it, note it, try again tomorrow.", "text3": "Do-overs come standard with every new day."}, {"num": 150, "category": "Self-Reflection", "name": "Energy audit", "description": "Note what gave/drained energy today", "text1": "Two columns: gave energy, took energy. One entry each.", "text2": "Your calendar says where time went; this says where energy went.", "text3": ""}, {"num": 151, "category": "Self-Reflection", "name": "Future-self letter line", "description": "Add one line to a letter", "text1": "One line a day to future you.", "text2": "No pressure - future you is likely a patient reader.", "text3": "A slow letter is still a letter."}, {"num": 152, "category": "Self-Reflection", "name": "Name today's fear", "description": "Write the day's biggest fear", "text1": "Write the fear down. On paper it has edges.", "text2": "One fear a day, named and noted.", "text3": "Naming things is an old and honest kind of courage."}, {"num": 153, "category": "Self-Reflection", "name": "Progress photo/note", "description": "Capture one project's progress", "text1": "One photo or line documenting where the project stands.", "text2": "Progress is easier to see in a timeline than a mirror.", "text3": "Build the before-and-after, one \"during\" at a time."}, {"num": 154, "category": "Self-Reflection", "name": "Identity vote", "description": "Note one act proving who you're becoming", "text1": "Note one thing you did today that fits who you're becoming.", "text2": "\"I ran today\" is a vote for \"I'm a runner.\"", "text3": "Identity is built in small receipts."}, {"num": 155, "category": "Self-Reflection", "name": "Weekly-goal glance", "description": "Reread this week's goal daily", "text1": "Read this week's goal once a day. Ten seconds.", "text2": "Goals fade when unread. Keep this one lit.", "text3": "A daily glance keeps the week pointed somewhere."}, {"num": 156, "category": "Out-of-the-Box Habits", "name": "Wrong-hand minute", "description": "Brush/eat with non-dominant hand", "text1": "Give your other hand a chance. It's been waiting.", "text2": "Clumsy is the point - new things always start clumsy.", "text3": "One minute a day of doing it the hard way, on purpose."}, {"num": 158, "category": "Out-of-the-Box Habits", "name": "Question one assumption", "description": "Write \"what if I'm wrong about...\"", "text1": "Finish this sentence daily: \"What if I'm wrong about...\"", "text2": "One assumption a day gets a friendly interrogation.", "text3": "Strong opinions, loosely held - practiced in one line."}, {"num": 159, "category": "Out-of-the-Box Habits", "name": "Talk to an object", "description": "Thank one object for its service", "text1": "Thank the kettle. Out loud. We won't tell anyone.", "text2": "A silly habit with a serious core: noticing what serves you.", "text3": "Your belongings work hard. Acknowledge one daily."}, {"num": 160, "category": "Out-of-the-Box Habits", "name": "Invent a word", "description": "Coin one word for a nameless feeling", "text1": "That feeling with no name? Name it today.", "text2": "One invented word a day. Dictionary optional.", "text3": "Language is a toy. Play with it."}, {"num": 161, "category": "Out-of-the-Box Habits", "name": "60-second time travel", "description": "Vividly recall this day last year", "text1": "Where were you exactly one year ago today? Visit.", "text2": "One minute of time travel, no equipment needed.", "text3": "The past is closer than it looks."}, {"num": 162, "category": "Out-of-the-Box Habits", "name": "Opposite opinion minute", "description": "Argue against your own view", "text1": "Take one of your opinions and argue the other side for a minute.", "text2": "Playing devil's advocate with yourself - quietly, daily.", "text3": "A stretch class for the mind."}, {"num": 163, "category": "Out-of-the-Box Habits", "name": "Eyes-closed routine", "description": "Do one safe task eyes closed", "text1": "Try one safe, familiar task with eyes closed.", "text2": "Let your hands prove they know the way.", "text3": "Your other senses would like some screen time too."}, {"num": 164, "category": "Out-of-the-Box Habits", "name": "Message to future you", "description": "Schedule a note to next month's you", "text1": "Write a note; schedule it to arrive next month.", "text2": "Future you loves getting mail from past you.", "text3": "A conversation with yourself, spread across time."}, {"num": 165, "category": "Out-of-the-Box Habits", "name": "Random act, no credit", "description": "One anonymous kind act", "text1": "One kind act today that nobody can trace to you.", "text2": "Kindness without a receipt.", "text3": "The secret is part of the fun."}, {"num": 167, "category": "Out-of-the-Box Habits", "name": "Name the machine's job", "description": "Notice one automated helper", "text1": "Notice one machine quietly working for you today.", "text2": "Fridge, router, elevator, traffic light - today's nominee?", "text3": "The invisible helpers deserve one second of recognition."}, {"num": 168, "category": "Out-of-the-Box Habits", "name": "Draw your mood", "description": "Sketch today's mood as a shape", "text1": "Today's mood, as a shape. Draw it.", "text2": "No art skills required - moods aren't realistic anyway.", "text3": "A wordless diary entry, once a day."}, {"num": 169, "category": "Out-of-the-Box Habits", "name": "Two-minute silence pact", "description": "Total silence: no input/output", "text1": "Two minutes: nothing in, nothing out. Just quiet.", "text2": "No podcast, no talking, no typing.", "text3": "Silence is a flavor. Taste it daily."}, {"num": 171, "category": "Out-of-the-Box Habits", "name": "Ask a child's question", "description": "Ask \"why?\" about one normal thing", "text1": "Ask \"why?\" about something everyone takes for granted.", "text2": "Why is the sky blue? Why do we shake hands? Pick one, look it up.", "text3": "Wonder is a habit too."}, {"num": 172, "category": "Out-of-the-Box Habits", "name": "Reverse to-do", "description": "List what you WON'T do today", "text1": "Write what you're not doing today.", "text2": "Subtraction is also a plan.", "text3": "The not-to-do list protects the to-do list."}, {"num": 173, "category": "Out-of-the-Box Habits", "name": "Smile at your reflection", "description": "Genuine smile in the mirror", "text1": "One real smile at the mirror. Yes, at yourself.", "text2": "Awkward at first. Most good things are.", "text3": "Be on friendlier terms with the person in the glass."}, {"num": 174, "category": "Out-of-the-Box Habits", "name": "One-minute alien view", "description": "See your life as a visitor would", "text1": "For one minute, observe your day like a curious visitor from space.", "text2": "\"Fascinating - the human queues for bean water.\"", "text3": "Perspective is one imaginary step away."}, {"num": 175, "category": "Out-of-the-Box Habits", "name": "Whisper a secret goal", "description": "Say your wildest goal aloud daily", "text1": "Say the big goal out loud, once a day, even in a whisper.", "text2": "Hearing it makes it more real than thinking it.", "text3": "Goals like being spoken to."}, {"num": 176, "category": "Work & Career", "name": "Write one work win", "description": "Log one accomplishment daily", "text1": "One line a day about something you handled well.", "text2": "Keep your own record - memory is a poor archivist.", "text3": "Future performance reviews are written one line at a time."}, {"num": 177, "category": "Work & Career", "name": "Learn one shortcut", "description": "One keyboard/tool shortcut daily", "text1": "One shortcut a day, immediately used three times.", "text2": "The tools you use daily reward the learning.", "text3": "Small speed, compounded."}, {"num": 178, "category": "Work & Career", "name": "Tidy your desktop", "description": "Delete/file one desktop item", "text1": "One desktop icon a day: file it or delete it.", "text2": "Digital tidiness, in the least effortful installments.", "text3": "Someday you'll see the wallpaper again."}, {"num": 179, "category": "Work & Career", "name": "One sentence of feedback", "description": "Give one colleague brief feedback", "text1": "One specific, kind, useful sentence a day.", "text2": "\"That intro really worked\" counts.", "text3": "Feedback in small doses is easier to give and take."}, {"num": 180, "category": "Work & Career", "name": "Update one skill note", "description": "Note one thing learned at work", "text1": "One line: what did work teach you today?", "text2": "You learn more than you notice. Start noticing.", "text3": "A running list of growing competence."}, {"num": 181, "category": "Work & Career", "name": "Prep one question", "description": "Bring one question to any meeting", "text1": "Walk into meetings with one question ready.", "text2": "Good questions are a form of participation.", "text3": "One prepared question beats an hour of nodding."}, {"num": 182, "category": "Work & Career", "name": "Two-minute deep tidy", "description": "Organize one drawer/folder at work", "text1": "One drawer or folder, two minutes, slightly better than before.", "text2": "Workspaces are organized in installments.", "text3": "Micro-tidying: all the satisfaction, none of the Saturday."}, {"num": 183, "category": "Work & Career", "name": "Micro-networking", "description": "Comment/react meaningfully to one peer", "text1": "One genuine comment on a colleague's work, daily.", "text2": "\"This helped me\" is networking too.", "text3": "Professional relationships grow in small touches."}, {"num": 184, "category": "Work & Career", "name": "End-of-work shutdown", "description": "Say \"done\" and close everything", "text1": "Close the tabs, say \"done,\" mean it.", "text2": "Work needs an off switch. Install one.", "text3": "The workday deserves an ending, not a fade-out."}, {"num": 185, "category": "Work & Career", "name": "One process improvement", "description": "Note one thing to do better", "text1": "One note a day: what could work a little better?", "text2": "Small frictions, written down, tend to get fixed.", "text3": "Improvement is a noticing habit first."}, {"num": 186, "category": "Emotional Fitness", "name": "Pause before reacting", "description": "One breath before responding", "text1": "One breath between the trigger and the reply.", "text2": "The pause is small. What it prevents isn't.", "text3": "Respond, don't ricochet - one breath is the difference."}, {"num": 187, "category": "Emotional Fitness", "name": "Self-compassion line", "description": "Say one kind sentence to yourself", "text1": "One kind sentence, said to yourself, daily.", "text2": "Talk to yourself like someone you're rooting for.", "text3": "The inner critic has a mic. Give the inner friend one too."}, {"num": 188, "category": "Emotional Fitness", "name": "Cry/laugh permission", "description": "Allow one full feeling, 1 min", "text1": "One minute a day where a feeling gets to just be felt.", "text2": "No fixing, no analyzing - just permission.", "text3": "Feelings pass through more easily than they park."}, {"num": 189, "category": "Emotional Fitness", "name": "Forgive one small thing", "description": "Release one minor grievance", "text1": "Pick one small annoyance from today and set it down.", "text2": "The parking spot thief doesn't need to live in your head.", "text3": "Travel lighter, one released grudge at a time."}, {"num": 190, "category": "Emotional Fitness", "name": "Anxiety fact-check", "description": "Ask \"is this thought true?\"", "text1": "One anxious thought a day gets a fact-check.", "text2": "\"Is this true? Is it certain? Is it useful?\"", "text3": "Thoughts are suggestions, not verdicts. Verify one daily."}, {"num": 191, "category": "Emotional Fitness", "name": "Celebrate tiny wins", "description": "Fist-pump one small success", "text1": "One small win a day gets an actual fist pump.", "text2": "Yes, physically. Yes, even for sending an email.", "text3": "Finishing things should feel like something."}, {"num": 192, "category": "Emotional Fitness", "name": "Sit with discomfort 60s", "description": "Don't fix one discomfort, feel it", "text1": "One small discomfort a day: don't fix it for sixty seconds.", "text2": "The itch, the urge, the awkward silence - just observe.", "text3": "Discomfort is survivable. Practice proving it in small doses."}, {"num": 193, "category": "Emotional Fitness", "name": "Say it out loud", "description": "Voice one suppressed thought (alone)", "text1": "Say the unsaid thing out loud - to an empty room counts.", "text2": "Some thoughts just need air.", "text3": "Words carry less weight outside your head."}, {"num": 194, "category": "Emotional Fitness", "name": "Courage rep", "description": "Do one 2% scary thing daily", "text1": "One slightly-scary thing a day. Just 2% scary.", "text2": "Raise your hand, send the message, ask the question.", "text3": "Courage is a muscle with a very low minimum order."}, {"num": 195, "category": "Emotional Fitness", "name": "Let one thing go", "description": "Consciously drop one control urge", "text1": "Pick one thing today and let it happen without your supervision.", "text2": "Not everything needs a manager.", "text3": "Practice releasing your grip, one small thing at a time."}, {"num": 196, "category": "Brain Training", "name": "Mental math bite", "description": "Solve one arithmetic problem mentally", "text1": "One sum a day, no calculator allowed.", "text2": "Tips, splits, and discounts are free practice material.", "text3": "Keep the mental arithmetic lights on."}, {"num": 197, "category": "Brain Training", "name": "Memorize one line", "description": "One quote/verse committed daily", "text1": "One line a day: a quote, a lyric, a verse.", "text2": "Carry a few good sentences in your head.", "text3": "Memorizing is a skill that likes small assignments."}, {"num": 198, "category": "Brain Training", "name": "Recall your day backwards", "description": "Rewind today in reverse", "text1": "Before sleep, rewind the day: evening first, morning last.", "text2": "A memory workout disguised as a bedtime ritual.", "text3": "Days are more interesting played in reverse."}, {"num": 199, "category": "Brain Training", "name": "One puzzle a day", "description": "Sudoku/chess/crossword, one bite", "text1": "One puzzle, or one bite of a bigger one.", "text2": "Crossword clue, chess move, sudoku row - pick your flavor.", "text3": "A small daily appointment with a solvable problem."}, {"num": 200, "category": "Brain Training", "name": "Name 5 in a category", "description": "5 capitals, elements, films, etc.", "text1": "Pick a category, name five, no phone.", "text2": "Five rivers. Five composers. Five kinds of pasta. Go.", "text3": "A pocket-sized retrieval workout."}, {"nu ile attached.", "text2": "Courtesy is small, portable, and always appropriate.", "text3": "Everyday politeness, done on purpose."}, {"num": 208, "category": "Kindness & Contribution", "name": "Share one useful thing", "description": "Send one helpful link/tip", "text1": "Saw something useful? Send it to the person it fits.", "text2": "\"This made me think of you\" is a great message.", "text3": "Be a source of good finds."}, {"num": 209, "category": "Kindness & Contribution", "name": "Leave a good review", "description": "Review one small business, 2 min", "text1": "Two minutes, one honest review, one small business.", "text2": "Reviews are free to give and valuable to receive.", "text3": "Loved the coffee? Tell the internet."}, {"num": 210, "category": "Kindness & Contribution", "name": "Teach one tiny thing", "description": "Show someone one small trick", "text1": "Teach one small thing you know to someone who doesn't.", "text2": "Shortcuts, recipes, tricks - knowledge likes to travel.", "text3": "Everyone knows something worth passing on."}, {"num": 211, "category": "Kindness & Contribution", "name": "Donate one dollar/item", "description": "One tiny daily contribution", "text1": "One small daily contribution: a coin, an item, a click.", "text2": "Generosity in installments still counts.", "text3": "Giving, practiced daily, becomes a reflex."}, {"num": 212, "category": "Kindness & Contribution", "name": "Check on the quiet one", "description": "Notice who's silent, reach out", "text1": "Notice who's gone quiet lately. Send them a line.", "text2": "Quiet doesn't always mean fine.", "text3": "One small check-in can be well-timed."}, {"num": 213, "category": "Kindness & Contribution", "name": "Feed something", "description": "Feed birds, a pet, or a plant daily", "text1": "Feed something living, once a day.", "text2": "", "text3": "Caring for something small is its own kind of ritual."}, {"num": 214, "category": "Kindness & Contribution", "name": "Compliment the work, not looks", "description": "Praise effort/craft daily", "text1": "Praise what someone did, not how they look.", "text2": "\"You handled that well\" lands deeper than most compliments.", "text3": "Effort deserves an audience. Be one, daily."}, {"num": 215, "category": "Kindness & Contribution", "name": "Say \"thank you\" to service workers by name", "description": "Use their name tag", "text1": "The name tag is there for a reason. Use it kindly.", "text2": "\"Thanks, Sam\" beats \"thanks\" — same breath, more human.", "text3": "A two-word upgrade to everyday gratitude."}, {"num": 216, "category": "Speech & Communication", "name": "One filler-free minute", "description": "Speak 1 min without \"um/like\"", "text1": "Talk for one minute, no \"um,\" no \"like.\" Harder than it sounds.", "text2": "Pauses are allowed. Pauses are encouraged.", "text3": "A daily minute of deliberate speech."}, {"num": 218, "category": "Speech & Communication", "name": "Say \"I don't know\"", "description": "Admit one unknown honestly daily", "text1": "Once a day, out loud: \"I don't know.\"", "text2": "Not knowing is where knowing starts.", "text3": "Honesty about the gaps - a small daily practice."}, {"num": 219, "category": "Speech & Communication", "name": "One slow sentence", "description": "Say one sentence 50% slower", "text1": "Pick one sentence today and say it at half speed.", "text2": "Slow speech is a choice, not a flaw.", "text3": "Give one idea the pace it deserves."}, {"num": 220, "category": "Speech & Communication", "name": "Replace \"sorry\" once", "description": "Swap one sorry for \"thank you\"", "text1": "Once a day: \"thanks for waiting\" instead of \"sorry I'm late.\"", "text2": "Save \"sorry\" for actual apologies.", "text3": "Same politeness, different posture."}, {"num": 221, "category": "Speech & Communication", "name": "Voice memo a thought", "description": "Record one 60-second thought", "text1": "One idea a day, spoken into a voice memo.", "text2": "Talking a ": "Flip and catch", "description": "Flip a coin/bottle, catch it clean", "text1": "One object, flipped and caught, ten times.", "text2": "Add difficulty as you go: higher, spinning, behind the back.", "text3": "Tiny circus training for ordinary hands."}, {"num": 248, "category": "Bonus: Tiny Skill Practice", "name": "Solve one Rubik's step", "description": "Learn cube solving in pieces", "text1": "One layer, one algorithm, one day at a time.", "text2": "The cube looks impossible. It's just patient.", "text3": "A famous puzzle, dismantled into daily bites."}, {"num": 249, "category": "Bonus: Tiny Skill Practice", "name": "Practice a whistle tune", "description": "Whistle one melody cleanly", "text1": "Pick a tune; whistle it a little better each day.", "text2": "Note by note, like any instrument - just built in.", "text3": "Your lips are the most portable instrument you own."}, {"num": 250, "category": "Bonus: Tiny Skill Practice", "name": "Speed-type one sentence", "description": "Type a line fast and clean", "text1": "One sentence, typed as fast and accurately as you can.", "text2": "Race yesterday's you, nobody else.", "text3": "A daily 20-second duel with your keyboard."}, {"num": 251, "category": "Play & Joy", "name": "Practice power pose", "description": "Stand tall, hands on hips, 1 min", "text1": "Feet apart, hands on hips, chin up. Hold for a minute.", "text2": "Practiced in private.", "text3": "Your body talks brain into confidence faster than the other way around."}, {"num": 252, "category": "Play & Joy", "name": "Play with your pet", "description": "1–5 min of full-attention play", "text1": "Phone down, toy out, full attention on the furball.", "text2": "They've been waiting for this all day.", "text3": "A few minutes of play, both of you off duty."}, {"num": 253, "category": "Learning & Growth", "name": "Learn a new word", "description": "One new word in your own language", "text1": "One word from your own language you've never used.", "text2": "Petrich
